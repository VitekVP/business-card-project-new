<header class="header">
  <div class="container header-wrapper">
    <picture>
      <source
        media="(min-width: 1200px)"
        type="png"
        srcset="./images/logo/logo_l@1x.png 1x, ./images/logo/logo_l@2x.png 2x"
      />
      <source
        media="(min-width: 768px)"
        type="png"
        srcset="./images/logo/logo_m@1x.png 1x, ./images/logo/logo_m@2x.png 2x"
      />
      <source
        media="(max-width: 767.98px)"
        type="png"
        srcset="./images/logo/logo_s@1x.png 1x, ./images/logo/logo_s@2x.png 2x"
      />
      <img
        class="header-logo"
        src="./images/logo/logo_s@1x.png"
        alt="Logo"
        width="40"
        height="40"
        loading="lazy"
      />
    </picture>
    <nav>
      <ul class="nav">
        <li><a class="nav-link" href="#about">Про нас</a></li>
        <li><a class="nav-link" href="#products">Наша продукція</a></li>
        <li><a class="nav-link" href="#gallery">Галерея</a></li>
        <li><a class="nav-link" href="#contacts">Контакти</a></li>
      </ul>
    </nav>
    <button class="header-menu js-open-menu" type="button">
      <svg class="header-icon" width="32" height="32">
        <use href="./images/icons.svg#icon-menu"></use>
      </svg>
    </button>
  </div>
</header>
